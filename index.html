<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号 Markdown 美化器</title>
<style>
/* ===== Reset & Base ===== */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;font-size:14px;color:#24292f;background:#f8f9fa}

/* ===== Design System §8.1 ===== */
/* 8px grid: 4/8/12/16/24/32/48 */
/* Type scale: Display 16/600/#1a1a2e, Body 14/400/#24292f, Caption 12/400/#8b949e, Label 13/500/#57606a */
/* Colors: Primary #2563eb, Hover #1d4ed8, Surface #fff, BG #f8f9fa, Editor #fafbfc, Border #e5e7eb */
/* Radius: 8px uniform. Shadows: sm/md/focus. Transition: all 150ms ease */

/* ===== Layout ===== */
.app{display:flex;flex-direction:column;height:100vh;min-width:1024px}

/* §8.2 Toolbar — clean white bar */
.toolbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 24px;background:#ffffff;border-bottom:1px solid #e5e7eb;flex-shrink:0}
.toolbar-left{display:flex;align-items:center;gap:24px}
.toolbar-right{display:flex;align-items:center;gap:8px}

/* Brand — text only, no icon */
.brand-text{font-size:16px;font-weight:600;color:#1a1a2e;white-space:nowrap}

/* §8.3 Custom Dropdown Theme Selector */
.theme-dropdown{position:relative}
.theme-dropdown-trigger{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;transition:all 150ms ease;user-select:none}
.theme-dropdown-trigger:hover{border-color:#d1d5db;background:#f9fafb}
.theme-dropdown-trigger .current-name{font-size:13px;font-weight:500;color:#24292f}
.theme-dropdown-trigger .chevron{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid #8b949e;transition:transform 150ms ease}
.theme-dropdown.open .chevron{transform:rotate(180deg)}
.theme-dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;min-width:240px;background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:50;display:none;overflow:hidden}
.theme-dropdown.open .theme-dropdown-menu{display:block}
.theme-option{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;transition:background 150ms ease;font-size:13px;color:#24292f}
.theme-option:hover{background:#f3f4f6}
.theme-option.active{color:#2563eb}
.theme-option .check{width:16px;font-size:13px;flex-shrink:0;text-align:center}
.theme-option .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.theme-option .theme-info{display:flex;flex-direction:column;gap:1px}
.theme-option .theme-name{font-weight:500;font-size:13px}
.theme-option .theme-desc{font-size:12px;color:#8b949e}
.theme-option.active .theme-desc{color:#93b4f5}

/* Main area */
.main{display:flex;flex:1;overflow:hidden}

/* §8.4 Editor */
.editor-pane{flex:1;display:flex;flex-direction:column;background:#fafbfc;min-width:0}
.editor-pane textarea{flex:1;border:none;outline:none;resize:none;padding:24px;font-family:Menlo,Consolas,'Courier New',monospace;font-size:14px;line-height:1.6;color:#24292f;background:#fafbfc;tab-size:4;caret-color:#2563eb}
.editor-pane textarea::placeholder{color:#c9cdd4;font-style:normal}
.editor-pane textarea:focus{outline:none}

/* §8.6 Divider — 1px static line */
.divider{width:1px;background:#e5e7eb;flex-shrink:0}

/* §8.5 Preview */
.preview-pane{flex:1;display:flex;flex-direction:column;background:#f8f9fa;overflow-y:auto;padding:24px;min-width:0}
.preview-wrapper{max-width:680px;margin:0 auto;background:#ffffff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);width:100%}
.preview-content{padding:32px}

/* §8.10 Status Bar */
.statusbar{display:flex;align-items:center;justify-content:space-between;height:32px;padding:0 24px;background:#ffffff;border-top:1px solid #e5e7eb;font-size:12px;color:#8b949e;flex-shrink:0}

/* ===== Toolbar Controls ===== */

/* §8.7 Settings Button */
.btn-settings{background:none;border:1px solid #e5e7eb;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#8b949e;transition:all 150ms ease}
.btn-settings:hover{color:#57606a;border-color:#d1d5db;background:#f9fafb}
.btn-settings.active{color:#2563eb;border-color:#2563eb;background:rgba(37,99,235,0.05)}

/* §8.8 Copy Button */
.btn-copy{background:#2563eb;color:#ffffff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:all 150ms ease}
.btn-copy:hover{background:#1d4ed8}
.btn-copy:active{transform:scale(0.98)}
.btn-copy.success{background:#16a34a}
.btn-copy.fail{background:#dc2626}

/* §8.9 Settings Panel */
.settings-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.1);z-index:100;display:none}
.settings-overlay.show{display:block}
.settings-panel{position:fixed;top:0;right:0;width:300px;height:100%;background:#ffffff;z-index:101;box-shadow:-4px 0 16px rgba(0,0,0,0.08);border-radius:8px 0 0 8px;transform:translateX(100%);transition:transform 200ms ease;display:flex;flex-direction:column}
.settings-panel.show{transform:translateX(0)}
.settings-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #e5e7eb}
.settings-header h3{font-size:15px;font-weight:600;color:#1a1a2e}
.settings-close{background:none;border:none;font-size:20px;cursor:pointer;color:#8b949e;padding:0;line-height:1;transition:color 150ms ease}
.settings-close:hover{color:#24292f}
.settings-body{padding:24px;overflow-y:auto;flex:1}
.setting-item{margin-bottom:24px}
.setting-item label{display:block;font-size:13px;font-weight:500;color:#57606a;margin-bottom:8px}
.setting-item .range-row{display:flex;align-items:center;gap:8px}
.setting-item input[type=range]{flex:1;accent-color:#2563eb}
.setting-item .range-val{font-size:12px;color:#8b949e;min-width:40px;text-align:right}
.setting-item input[type=color]{width:40px;height:32px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;padding:2px}
.setting-item select{width:100%;padding:6px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;color:#24292f;background:#ffffff;transition:all 150ms ease;outline:none}
.setting-item select:hover{border-color:#d1d5db}
.setting-item select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.15)}

/* ===== Toast ===== */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-16px);background:#24292f;color:#ffffff;padding:8px 24px;border-radius:8px;font-size:13px;opacity:0;transition:all 150ms ease;pointer-events:none;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <!-- Toolbar §8.2 -->
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="brand-text">Markdown 美化器</span>
      <!-- §8.3 Custom Dropdown -->
      <div class="theme-dropdown" id="themeDropdown">
        <div class="theme-dropdown-trigger" id="themeTrigger">
          <span class="current-name" id="currentThemeName">简约</span>
          <span class="chevron"></span>
        </div>
        <div class="theme-dropdown-menu" id="themeMenu"></div>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="btn-settings" id="settingsBtn" title="样式微调">⚙</button>
      <button class="btn-copy" id="copyBtn">复制</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="mainArea">
    <div class="editor-pane" id="editorPane">
      <textarea id="editor" spellcheck="false" placeholder="在这里输入 Markdown..."></textarea>
    </div>
    <div class="divider"></div>
    <div class="preview-pane" id="previewPane">
      <div class="preview-wrapper">
        <div class="preview-content" id="preview"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar §8.10 -->
  <div class="statusbar">
    <span id="charCount">0 字</span>
    <span id="themeName">简约</span>
    <span id="storageStatus">已保存</span>
  </div>
</div>

<!-- Settings Panel §8.9 -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h3>样式微调</h3>
    <button class="settings-close" id="settingsClose">&times;</button>
  </div>
  <div class="settings-body">
    <div class="setting-item">
      <label>正文字号</label>
      <div class="range-row">
        <input type="range" id="fontSize" min="14" max="18" step="1" value="16">
        <span class="range-val" id="fontSizeVal">16px</span>
      </div>
    </div>
    <div class="setting-item">
      <label>行间距</label>
      <div class="range-row">
        <input type="range" id="lineHeight" min="1.5" max="2.5" step="0.05" value="1.75">
        <span class="range-val" id="lineHeightVal">1.75</span>
      </div>
    </div>
    <div class="setting-item">
      <label>主题色</label>
      <input type="color" id="themeColor" value="#2563eb">
    </div>
    <div class="setting-item">
      <label>代码块配色</label>
      <select id="codeTheme">
        <option value="light">浅色</option>
        <option value="dark">深色</option>
        <option value="monokai">Monokai</option>
      </select>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===================================================================
// Markdown Parser — lightweight, zero-dependency
// ===================================================================
(function(){
'use strict';

// ----- Syntax Highlighter -----
var HL_KEYWORDS = {
  js: /\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|this|class|extends|import|export|default|from|async|await|try|catch|throw|typeof|instanceof|in|of|null|undefined|true|false|void|delete|yield)\b/g,
  python: /\b(def|class|return|if|elif|else|for|while|import|from|as|try|except|finally|raise|with|yield|lambda|pass|break|continue|and|or|not|in|is|None|True|False|self|print|global|nonlocal|async|await)\b/g,
  html: /\b(html|head|body|div|span|p|a|img|ul|ol|li|table|tr|td|th|h[1-6]|script|style|link|meta|form|input|button|select|option|textarea)\b/g,
  css: /\b(color|background|margin|padding|border|font|display|position|width|height|flex|grid|align|justify|overflow|opacity|transition|transform|animation|z-index|top|left|right|bottom|none|auto|inherit|solid|block|inline|absolute|relative|fixed|center)\b/g,
  json: null
};

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function highlightCode(code, lang){
  lang = (lang||'').toLowerCase().replace(/^javascript$/,'js').replace(/^py$/,'python');
  var h = escHtml(code);
  h = h.replace(/(["'`])(?:(?!\1|\\).|\\.)*?\1/g, function(m){return '<span style="color:#e6db74">'+m+'</span>'});
  h = h.replace(/(\/\/.*$)/gm, function(m){return '<span style="color:#75715e">'+m+'</span>'});
  h = h.replace(/(#[^\n<]*)/g, function(m){
    if(lang==='css') return m;
    return '<span style="color:#75715e">'+m+'</span>';
  });
  h = h.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#ae81ff">$1</span>');
  var kw = HL_KEYWORDS[lang];
  if(kw){
    h = h.replace(kw, function(m){return '<span style="color:#f92672;font-weight:bold">'+m+'</span>'});
  }
  return h;
}

// ----- Themes -----
var THEMES = {
  minimal: {
    name:'简约', desc:'黑白灰，干净清爽', dot:'#333333',
    h1Color:'#000', h2Color:'#333', h3Color:'#555',
    textColor:'#333', linkColor:'#576b95',
    quoteBg:'#f7f7f7', quoteBorder:'#ddd', quoteColor:'#666',
    codeBg:'#f6f8fa', codeColor:'#333', codeBorder:'#e1e4e8',
    tableBorderColor:'#ddd', tableHeaderBg:'#f6f8fa', tableStripeBg:'#fafafa',
    hrColor:'#eee'
  },
  tech: {
    name:'科技', desc:'蓝色系，技术范儿', dot:'#1890ff',
    h1Color:'#0d47a1', h2Color:'#1565c0', h3Color:'#1976d2',
    textColor:'#37474f', linkColor:'#1890ff',
    quoteBg:'#e3f2fd', quoteBorder:'#1890ff', quoteColor:'#37474f',
    codeBg:'#263238', codeColor:'#eeffff', codeBorder:'#37474f',
    tableBorderColor:'#b0bec5', tableHeaderBg:'#e3f2fd', tableStripeBg:'#f5f5f5',
    hrColor:'#b0bec5'
  },
  literary: {
    name:'文艺', desc:'暖色调，温馨优雅', dot:'#8d6e63',
    h1Color:'#5d4037', h2Color:'#6d4c41', h3Color:'#795548',
    textColor:'#4e342e', linkColor:'#8d6e63',
    quoteBg:'#fbe9e7', quoteBorder:'#d7ccc8', quoteColor:'#5d4037',
    codeBg:'#efebe9', codeColor:'#4e342e', codeBorder:'#d7ccc8',
    tableBorderColor:'#d7ccc8', tableHeaderBg:'#efebe9', tableStripeBg:'#fafaf8',
    hrColor:'#d7ccc8'
  },
  acg: {
    name:'二次元', desc:'粉紫渐变，活泼可爱', dot:'#e91e90',
    h1Color:'#e91e90', h2Color:'#9c27b0', h3Color:'#7c4dff',
    textColor:'#424242', linkColor:'#e91e90',
    quoteBg:'#fce4ec', quoteBorder:'#e91e90', quoteColor:'#6a1b9a',
    codeBg:'#fce4ec', codeColor:'#880e4f', codeBorder:'#f8bbd0',
    tableBorderColor:'#e1bee7', tableHeaderBg:'#f3e5f5', tableStripeBg:'#fce4ec',
    hrColor:'#e1bee7',
    h1Deco:'gradient', headingFont:null
  },
  business: {
    name:'商务', desc:'深蓝金色，严谨专业', dot:'#1a237e',
    h1Color:'#1a237e', h2Color:'#283593', h3Color:'#303f9f',
    textColor:'#37474f', linkColor:'#1a237e',
    quoteBg:'#e8eaf6', quoteBorder:'#c5a842', quoteColor:'#1a237e',
    codeBg:'#eceff1', codeColor:'#263238', codeBorder:'#b0bec5',
    tableBorderColor:'#90a4ae', tableHeaderBg:'#1a237e', tableHeaderColor:'#fff', tableStripeBg:'#f5f5f5',
    hrColor:'#c5a842',
    h1Deco:null, headingFont:"'Georgia','Noto Serif SC',serif"
  }
};

// Theme default colors for themeColor picker
var THEME_DEFAULTS = {minimal:'#333333',tech:'#1890ff',literary:'#8d6e63',acg:'#e91e90',business:'#1a237e'};

// ----- Code block themes -----
var CODE_THEMES = {
  light: {bg:'#f6f8fa', color:'#333', border:'#e1e4e8'},
  dark: {bg:'#282c34', color:'#abb2bf', border:'#3e4451'},
  monokai: {bg:'#272822', color:'#f8f8f2', border:'#49483e'}
};

// ----- State -----
var state = {
  theme:'minimal',
  fontSize:16,
  lineHeight:1.75,
  themeColor:'#333333',
  codeTheme:'light',
  content:''
};

// Load from localStorage
try {
  var saved = JSON.parse(localStorage.getItem('m2w_state'));
  if(saved){
    if(saved.theme && THEMES[saved.theme]) state.theme = saved.theme;
    if(saved.fontSize>=14 && saved.fontSize<=18) state.fontSize = saved.fontSize;
    if(saved.lineHeight>=1.5 && saved.lineHeight<=2.5) state.lineHeight = saved.lineHeight;
    if(saved.themeColor) state.themeColor = saved.themeColor;
    if(saved.codeTheme && CODE_THEMES[saved.codeTheme]) state.codeTheme = saved.codeTheme;
    if(typeof saved.content === 'string') state.content = saved.content;
  }
} catch(e){}

// ----- Sample Article -----
var SAMPLE = '# 公众号 Markdown 美化器\n\n> 一键将 Markdown 转为公众号排版，复制粘贴即用。\n\n## 功能特性\n\n这是一个**纯前端**工具，支持以下 Markdown 语法：\n\n### 文本样式\n\n- **加粗文本**\n- *斜体文本*\n- ~~删除线文本~~\n- `行内代码` 也支持\n\n### 列表\n\n**无序列表：**\n\n- 第一项\n- 第二项\n- 第三项\n\n**有序列表：**\n\n1. 安装环境\n2. 编写代码\n3. 测试部署\n\n### 代码块\n\n```javascript\nfunction greet(name) {\n  const msg = `Hello, ${name}!`;\n  console.log(msg);\n  return msg;\n}\n\ngreet("World");\n```\n\n```python\ndef fibonacci(n):\n    if n <= 1:\n        return n\n    return fibonacci(n - 1) + fibonacci(n - 2)\n\nfor i in range(10):\n    print(fibonacci(i))\n```\n\n### 引用\n\n> 代码是写给人看的，附带能在机器上运行。\n> — Harold Abelson\n\n### 表格\n\n| 工具 | 语言 | 特点 |\n|------|------|------|\n| FFmpeg | C | 音视频处理的瑞士军刀 |\n| QEMU | C | 全系统模拟器 |\n| TCC | C | 最快的 C 编译器 |\n| QuickJS | C | 极简 JS 引擎 |\n\n### 链接\n\n推荐阅读 [Markdown 指南](https://www.markdownguide.org)，也可以参考 [GitHub 文档](https://docs.github.com)。\n\n### 图片\n\n![示例图片](https://via.placeholder.com/600x200/e3f2fd/1890ff?text=公众号+Markdown+美化器)\n\n### 分隔线\n\n---\n\n### 多级标题\n\n#### 四级标题\n\n##### 五级标题\n\n###### 六级标题\n\n感谢使用！🎉\n';

if(!state.content) state.content = SAMPLE;

// ----- DOM -----
var editor = document.getElementById('editor');
var preview = document.getElementById('preview');
var copyBtn = document.getElementById('copyBtn');
var settingsBtn = document.getElementById('settingsBtn');
var settingsPanel = document.getElementById('settingsPanel');
var settingsOverlay = document.getElementById('settingsOverlay');
var settingsClose = document.getElementById('settingsClose');
var fontSizeInput = document.getElementById('fontSize');
var fontSizeVal = document.getElementById('fontSizeVal');
var lineHeightInput = document.getElementById('lineHeight');
var lineHeightVal = document.getElementById('lineHeightVal');
var themeColorInput = document.getElementById('themeColor');
var codeThemeSelect = document.getElementById('codeTheme');
var charCountEl = document.getElementById('charCount');
var themeNameEl = document.getElementById('themeName');
var storageEl = document.getElementById('storageStatus');
var toastEl = document.getElementById('toast');
var themeDropdown = document.getElementById('themeDropdown');
var themeTrigger = document.getElementById('themeTrigger');
var themeMenu = document.getElementById('themeMenu');
var currentThemeNameEl = document.getElementById('currentThemeName');

// ----- §8.3 Build Theme Dropdown -----
function buildThemeMenu(){
  themeMenu.innerHTML = '';
  Object.keys(THEMES).forEach(function(key){
    var t = THEMES[key];
    var opt = document.createElement('div');
    opt.className = 'theme-option' + (key === state.theme ? ' active' : '');
    opt.innerHTML = '<span class="check">' + (key === state.theme ? '✓' : '') + '</span>' +
      '<span class="dot" style="background:' + t.dot + '"></span>' +
      '<span class="theme-info"><span class="theme-name">' + t.name + '</span>' +
      '<span class="theme-desc">' + t.desc + '</span></span>';
    opt.addEventListener('click', function(){
      state.theme = key;
      state.themeColor = THEME_DEFAULTS[key] || '#333333';
      themeColorInput.value = state.themeColor;
      buildThemeMenu();
      currentThemeNameEl.textContent = t.name;
      themeDropdown.classList.remove('open');
      render();
    });
    themeMenu.appendChild(opt);
  });
}

// Toggle dropdown
themeTrigger.addEventListener('click', function(e){
  e.stopPropagation();
  themeDropdown.classList.toggle('open');
});

// Close dropdown on outside click
document.addEventListener('click', function(e){
  if(!themeDropdown.contains(e.target)){
    themeDropdown.classList.remove('open');
  }
});

// ----- Init UI -----
editor.value = state.content;
currentThemeNameEl.textContent = THEMES[state.theme].name;
buildThemeMenu();
fontSizeInput.value = state.fontSize;
fontSizeVal.textContent = state.fontSize + 'px';
lineHeightInput.value = state.lineHeight;
lineHeightVal.textContent = state.lineHeight;
themeColorInput.value = state.themeColor;
codeThemeSelect.value = state.codeTheme;

// ----- Markdown Parser -----
function parseMD(src){
  var links = [];

  src = src.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  var t = getTheme();
  var ct = CODE_THEMES[state.codeTheme] || CODE_THEMES.light;
  var fs = state.fontSize;
  var lh = state.lineHeight;
  var tc = state.themeColor;

  var lines = src.split('\n');
  var html = '';
  var i = 0;

  while(i < lines.length){
    var line = lines[i];

    if(line.trim() === ''){
      i++;
      continue;
    }

    // Code block
    var codeMatch = line.match(/^```(\w*)\s*$/);
    if(codeMatch){
      var lang = codeMatch[1];
      var codeLines = [];
      i++;
      while(i < lines.length && !lines[i].match(/^```\s*$/)){
        codeLines.push(lines[i]);
        i++;
      }
      i++;
      var code = codeLines.join('\n');
      var hl = highlightCode(code, lang);
      html += '<pre style="background:'+ct.bg+';color:'+ct.color+';border:1px solid '+ct.border+';border-radius:4px;padding:16px;overflow-x:auto;font-family:Menlo,Consolas,\'Courier New\',monospace;font-size:13px;line-height:1.5;margin:16px 0;white-space:pre;word-wrap:normal"><code>'+hl+'</code></pre>';
      continue;
    }

    // Horizontal rule
    if(line.match(/^(---|\*\*\*|___)\s*$/)){
      html += '<hr style="border:none;border-top:1px solid '+t.hrColor+';margin:24px 0">';
      i++;
      continue;
    }

    // Headings
    var hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if(hMatch){
      var level = hMatch[1].length;
      var hText = inlineFormat(hMatch[2], t, tc, links);
      var hSizes = {1:24,2:20,3:18,4:16,5:14,6:13};
      var hColors = {1:t.h1Color,2:t.h2Color,3:t.h3Color,4:t.h3Color,5:t.h3Color,6:t.h3Color};
      var hWeight = level <= 3 ? 'bold' : '600';
      var hMargin = level <= 2 ? '28px 0 16px' : '20px 0 12px';
      var borderBottom = level === 1 ? 'border-bottom:2px solid '+tc+';padding-bottom:8px;' : level === 2 ? 'border-bottom:1px solid '+t.hrColor+';padding-bottom:6px;' : '';
      var hFontFamily = t.headingFont ? 'font-family:'+t.headingFont+';' : '';
      var hExtra = '';
      if(t.h1Deco==='gradient' && level <= 2){
        hExtra = 'background:linear-gradient(135deg,#e91e90,#9c27b0,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;';
      }
      html += '<h'+level+' style="font-size:'+hSizes[level]+'px;font-weight:'+hWeight+';color:'+hColors[level]+';margin:'+hMargin+';line-height:1.4;'+borderBottom+hFontFamily+hExtra+'">'+hText+'</h'+level+'>';
      i++;
      continue;
    }

    // Table
    if(line.indexOf('|') >= 0 && i+1 < lines.length && lines[i+1].match(/^\|?\s*[-:]+[-| :]*$/)){
      var tableRows = [];
      tableRows.push(parseTableRow(line));
      i++;
      var aligns = parseTableAlign(lines[i]);
      i++;
      while(i < lines.length && lines[i].indexOf('|') >= 0 && lines[i].trim() !== ''){
        tableRows.push(parseTableRow(lines[i]));
        i++;
      }
      html += renderTable(tableRows, aligns, t, fs, lh, tc, links);
      continue;
    }

    // Blockquote
    if(line.match(/^>\s?/)){
      var quoteLines = [];
      while(i < lines.length && (lines[i].match(/^>\s?/) || (lines[i].trim() !== '' && quoteLines.length > 0 && !lines[i].match(/^[#\-\*\d]/) ))){
        quoteLines.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      var quoteHtml = inlineFormat(quoteLines.join('<br>'), t, tc, links);
      var quoteRadius = t.h1Deco==='gradient' ? 'border-radius:12px;' : '';
      html += '<blockquote style="margin:16px 0;padding:12px 16px;background:'+t.quoteBg+';border-left:4px solid '+t.quoteBorder+';color:'+t.quoteColor+';font-size:'+fs+'px;line-height:'+lh+';'+quoteRadius+'">'+quoteHtml+'</blockquote>';
      continue;
    }

    // Unordered list
    if(line.match(/^[\-\*\+]\s/)){
      var items = [];
      while(i < lines.length && lines[i].match(/^[\-\*\+]\s/)){
        items.push(lines[i].replace(/^[\-\*\+]\s/, ''));
        i++;
      }
      html += '<ul style="margin:12px 0;padding-left:2em;list-style:disc">';
      for(var li=0; li<items.length; li++){
        html += '<li style="font-size:'+fs+'px;line-height:'+lh+';color:'+t.textColor+';margin:4px 0">'+inlineFormat(items[li],t,tc,links)+'</li>';
      }
      html += '</ul>';
      continue;
    }

    // Ordered list
    var olMatch = line.match(/^(\d+)\.\s/);
    if(olMatch){
      var items = [];
      while(i < lines.length && lines[i].match(/^\d+\.\s/)){
        items.push(lines[i].replace(/^\d+\.\s/, ''));
        i++;
      }
      html += '<ol style="margin:12px 0;padding-left:2em;list-style:decimal">';
      for(var li=0; li<items.length; li++){
        html += '<li style="font-size:'+fs+'px;line-height:'+lh+';color:'+t.textColor+';margin:4px 0">'+inlineFormat(items[li],t,tc,links)+'</li>';
      }
      html += '</ol>';
      continue;
    }

    // Paragraph
    var paraLines = [line];
    i++;
    while(i < lines.length && lines[i].trim() !== '' && !lines[i].match(/^(#{1,6}\s|```|>|\-\s|\*\s|\+\s|\d+\.\s|---|\*\*\*|___|.*\|.*\|)/) ){
      paraLines.push(lines[i]);
      i++;
    }
    var paraText = inlineFormat(paraLines.join('\n'), t, tc, links);
    html += '<p style="margin:12px 0;font-size:'+fs+'px;line-height:'+lh+';color:'+t.textColor+';letter-spacing:0.5px">'+paraText+'</p>';
  }

  // Footnotes for links
  if(links.length > 0){
    html += '<section style="margin-top:32px;padding-top:16px;border-top:1px solid '+t.hrColor+'">';
    html += '<p style="font-size:12px;color:#8b949e;margin-bottom:8px">参考链接</p>';
    for(var fi=0; fi<links.length; fi++){
      html += '<p style="font-size:12px;color:#8b949e;margin:2px 0;word-break:break-all">['+links[fi].idx+'] '+links[fi].text+'：'+escHtml(links[fi].url)+'</p>';
    }
    html += '</section>';
  }

  return html;
}

function inlineFormat(text, t, tc, links){
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = text.replace(/&lt;br&gt;/g, '<br>');

  // Images
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(m, alt, url){
    return '<img src="'+url+'" alt="'+alt+'" style="display:block;max-width:100%;margin:12px auto;border-radius:4px">';
  });

  // Links → footnote
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(m, lt, url){
    links.push({idx: links.length+1, text: lt, url: url});
    return '<span style="color:'+tc+';font-weight:500">'+lt+'</span><sup style="color:'+tc+';font-size:10px;margin-left:1px">['+links.length+']</sup>';
  });

  // Bold + Italic
  text = text.replace(/\*{3}(.+?)\*{3}/g, '<strong style="font-weight:bold"><em style="font-style:italic">$1</em></strong>');
  text = text.replace(/_{3}(.+?)_{3}/g, '<strong style="font-weight:bold"><em style="font-style:italic">$1</em></strong>');

  // Bold
  text = text.replace(/\*{2}(.+?)\*{2}/g, '<strong style="font-weight:bold">$1</strong>');
  text = text.replace(/_{2}(.+?)_{2}/g, '<strong style="font-weight:bold">$1</strong>');

  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em style="font-style:italic">$1</em>');
  text = text.replace(/_(.+?)_/g, '<em style="font-style:italic">$1</em>');

  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del style="text-decoration:line-through;color:#999">$1</del>');

  // Inline code
  text = text.replace(/`([^`]+)`/g, function(m, c){
    return '<code style="background:'+(t.codeBg||'#f6f8fa')+';color:'+(t.codeColor||'#333')+';padding:2px 6px;border-radius:3px;font-family:Menlo,Consolas,\'Courier New\',monospace;font-size:0.9em">'+c+'</code>';
  });

  text = text.replace(/\n/g, '<br>');
  return text;
}

function parseTableRow(line){
  line = line.trim();
  if(line.startsWith('|')) line = line.substring(1);
  if(line.endsWith('|')) line = line.substring(0, line.length-1);
  return line.split('|').map(function(c){return c.trim()});
}

function parseTableAlign(line){
  line = line.trim();
  if(line.startsWith('|')) line = line.substring(1);
  if(line.endsWith('|')) line = line.substring(0, line.length-1);
  return line.split('|').map(function(c){
    c = c.trim();
    if(c.startsWith(':') && c.endsWith(':')) return 'center';
    if(c.endsWith(':')) return 'right';
    return 'left';
  });
}

function renderTable(rows, aligns, t, fs, lh, tc, links){
  var html = '<table style="width:100%;border-collapse:collapse;margin:16px 0;font-size:'+fs+'px">';
  for(var r=0; r<rows.length; r++){
    var bg = r===0 ? t.tableHeaderBg : (r%2===0 ? t.tableStripeBg : '#fff');
    html += '<tr>';
    for(var c=0; c<rows[r].length; c++){
      var tag = r===0 ? 'th' : 'td';
      var align = aligns[c] || 'left';
      var fw = r===0 ? 'font-weight:600;' : '';
      var cellColor = (r===0 && t.tableHeaderColor) ? t.tableHeaderColor : t.textColor;
      html += '<'+tag+' style="border:1px solid '+t.tableBorderColor+';padding:8px 12px;text-align:'+align+';background:'+bg+';color:'+cellColor+';line-height:'+lh+';'+fw+'">'+inlineFormat(rows[r][c],t,tc,links)+'</'+tag+'>';
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

function getTheme(){
  var base = THEMES[state.theme] || THEMES.minimal;
  return Object.assign({}, base);
}

// ----- Render -----
var renderTimer = null;
function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 200);
}

function render(){
  var md = editor.value;
  state.content = md;
  preview.innerHTML = parseMD(md);
  charCountEl.textContent = md.length + ' 字';
  themeNameEl.textContent = (THEMES[state.theme]||THEMES.minimal).name;
  saveState();
}

function saveState(){
  try{
    localStorage.setItem('m2w_state', JSON.stringify(state));
    storageEl.textContent = '已保存';
  }catch(e){
    storageEl.textContent = '空间不足';
  }
}

// ----- Events -----
editor.addEventListener('input', scheduleRender);

fontSizeInput.addEventListener('input', function(){
  state.fontSize = parseInt(this.value);
  fontSizeVal.textContent = this.value+'px';
  render();
});

lineHeightInput.addEventListener('input', function(){
  state.lineHeight = parseFloat(this.value);
  lineHeightVal.textContent = parseFloat(this.value).toFixed(2);
  render();
});

themeColorInput.addEventListener('input', function(){
  state.themeColor = this.value;
  render();
});

codeThemeSelect.addEventListener('change', function(){
  state.codeTheme = this.value;
  render();
});

// Settings panel
settingsBtn.addEventListener('click', function(){
  settingsPanel.classList.toggle('show');
  settingsOverlay.classList.toggle('show');
  settingsBtn.classList.toggle('active');
});
settingsOverlay.addEventListener('click', closeSettings);
settingsClose.addEventListener('click', closeSettings);
function closeSettings(){
  settingsPanel.classList.remove('show');
  settingsOverlay.classList.remove('show');
  settingsBtn.classList.remove('active');
}

// Copy §8.8
copyBtn.addEventListener('click', function(){
  var content = preview.innerHTML;
  if(!content){showToast('没有可复制的内容');return}

  function onCopySuccess(){
    showToast('复制成功');
    copyBtn.textContent='已复制 ✓';
    copyBtn.classList.add('success');
    setTimeout(function(){copyBtn.textContent='复制';copyBtn.classList.remove('success')},1500);
  }
  function onCopyFail(){
    showToast('请手动 Ctrl+C / Cmd+C 复制');
    copyBtn.textContent='复制失败';
    copyBtn.classList.add('fail');
    setTimeout(function(){copyBtn.textContent='复制';copyBtn.classList.remove('fail')},1500);
  }

  if(navigator.clipboard && window.ClipboardItem){
    var blob = new Blob([content], {type:'text/html'});
    var item = new ClipboardItem({'text/html': blob, 'text/plain': new Blob([editor.value], {type:'text/plain'})});
    navigator.clipboard.write([item]).then(onCopySuccess).catch(function(){fallbackCopy(onCopySuccess,onCopyFail)});
  } else {
    fallbackCopy(onCopySuccess,onCopyFail);
  }
});

function fallbackCopy(onOk,onFail){
  var range = document.createRange();
  range.selectNodeContents(preview);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try{document.execCommand('copy');onOk()}catch(e){onFail()}
  sel.removeAllRanges();
}

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(function(){toastEl.classList.remove('show')},2000);
}

// ----- Init Render -----
render();

})();
</script>
